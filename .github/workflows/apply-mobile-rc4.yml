name: Aplicar parche móvil rc.4

on:
  push:
    branches:
      - fix/mobile-ui-technician-selector-1.0.0-rc.4

permissions:
  contents: write

concurrency:
  group: apply-mobile-rc4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'chore: aplicar parche móvil rc.4') }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          ref: fix/mobile-ui-technician-selector-1.0.0-rc.4
          fetch-depth: 0

      - name: Aplicar cambios versionados
        run: python3 scripts/apply_mobile_rc4.py

      - name: Confirmar cambios
        run: |
          if git diff --quiet; then
            echo "El parche ya estaba aplicado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/config/app.ts src/AppV2.tsx .github/workflows/production-readiness.yml
          git commit -m "chore: aplicar parche móvil rc.4"
          git push origin HEAD:fix/mobile-ui-technician-selector-1.0.0-rc.4
