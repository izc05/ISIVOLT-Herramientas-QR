name: Aplicar flujo rápido RC33

on:
  push:
    branches:
      - agent/rc33-fast-scan-technician-first
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-rc33-fast-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'chore: aplicar flujo rápido rc33') }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama RC33
        uses: actions/checkout@v4
        with:
          ref: agent/rc33-fast-scan-technician-first
          fetch-depth: 0

      - name: Aplicar parche idempotente
        run: python3 scripts/apply_rc33_fast_scan.py

      - name: Confirmar cambios
        run: |
          if git diff --quiet; then
            echo "El flujo RC33 ya estaba aplicado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppV4.tsx
          git commit -m "chore: aplicar flujo rápido rc33"
          git push origin HEAD:agent/rc33-fast-scan-technician-first
