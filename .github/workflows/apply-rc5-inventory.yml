name: Aplicar integración rc.5

on:
  push:
    branches:
      - feature/rc5-inventory-operations

permissions:
  contents: write

concurrency:
  group: apply-rc5-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'chore: aplicar integración rc.5') }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          ref: feature/rc5-inventory-operations
          fetch-depth: 0

      - name: Aplicar integración
        run: python3 scripts/apply_rc5_inventory.py

      - name: Confirmar cambios
        run: |
          if git diff --quiet; then
            echo "La integración ya estaba aplicada."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppV2.tsx src/main.tsx src/config/app.ts package.json package-lock.json .github/workflows/production-readiness.yml
          git commit -m "chore: aplicar integración rc.5"
          git push origin HEAD:feature/rc5-inventory-operations
