name: Aplicar integración de rectificaciones (histórico · manual)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rectification-integration-manual
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          ref: feature/security-0.9
          fetch-depth: 0

      - name: Integrar módulo
        run: python3 scripts/apply_rectification_integration.py

      - name: Confirmar cambios
        run: |
          if git diff --quiet; then
            echo "La integración ya estaba aplicada."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: aplicar integración de rectificaciones"
          git push origin HEAD:feature/security-0.9
