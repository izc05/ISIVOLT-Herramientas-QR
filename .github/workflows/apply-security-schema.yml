name: Aplicar esquema de seguridad (histórico · manual)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: security-schema-manual
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          ref: feature/security-0.9
          fetch-depth: 0

      - name: Aplicar migración
        run: python3 scripts/apply_security_schema.py

      - name: Confirmar cambios
        run: |
          if git diff --quiet; then
            echo "El esquema ya estaba actualizado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/sqlite/schema.ts src/data/sqlite/schema.test.ts
          git commit -m "chore: aplicar esquema de seguridad"
          git push origin HEAD:feature/security-0.9
