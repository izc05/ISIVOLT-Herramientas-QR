name: Generar APK Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Compilar APK de prueba
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Preparar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Instalar dependencias
        run: npm install

      - name: Compilar aplicación web
        run: npm run build

      - name: Crear proyecto Android temporal
        run: npx cap add android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Compilar APK debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ISIVOLT-Herramientas-QR-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
