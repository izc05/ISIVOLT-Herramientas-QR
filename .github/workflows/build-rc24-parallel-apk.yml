name: Generar APK RC30 paralela

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-parallel-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Preparar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Instalar dependencias
        run: npm install

      - name: Validar aplicación
        run: |
          npm test
          python3 scripts/validate_sqlite_schema.py
          node scripts/validate-production.mjs
          npm run build

      - name: Crear proyecto Android temporal
        run: |
          rm -rf android
          npx cap add android
          npm run android:configure
          npx cap sync android

      - name: Separar RC30 de la aplicación instalada
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          gradle = Path('android/app/build.gradle')
          text = gradle.read_text(encoding='utf-8')
          text, count = re.subn(
              r'applicationId\s+["\']com\.isivolt\.herramientasqr["\']',
              'applicationId "com.isivolt.herramientasqr.rc30"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('No se ha podido cambiar el applicationId de RC30.')
          text = re.sub(r'versionCode\s+\d+', 'versionCode 30001', text, count=1)
          text = re.sub(
              r'versionName\s+["\'][^"\']+["\']',
              'versionName "1.0.0-rc.30-test"',
              text,
              count=1,
          )
          gradle.write_text(text, encoding='utf-8')

          strings = Path('android/app/src/main/res/values/strings.xml')
          values = strings.read_text(encoding='utf-8')
          values = values.replace(
              '<string name="app_name">ISIVOLT Herramientas QR</string>',
              '<string name="app_name">ISIVOLT RC30 Pruebas</string>',
          )
          values = values.replace(
              '<string name="title_activity_main">ISIVOLT Herramientas QR</string>',
              '<string name="title_activity_main">ISIVOLT RC30 Pruebas</string>',
          )
          strings.write_text(values, encoding='utf-8')
          PY

          grep -n "applicationId\|versionCode\|versionName" android/app/build.gradle
          grep -n "RC30 Pruebas" android/app/src/main/res/values/strings.xml

      - name: Compilar APK de pruebas
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Preparar artefacto
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            release/ISIVOLT-Herramientas-QR-RC30-Pruebas.apk
          sha256sum release/ISIVOLT-Herramientas-QR-RC30-Pruebas.apk \
            > release/ISIVOLT-Herramientas-QR-RC30-Pruebas.sha256

      - name: Subir APK paralela
        uses: actions/upload-artifact@v4
        with:
          name: ISIVOLT-Herramientas-QR-RC30-Pruebas-paralela
          path: release/*
          retention-days: 30
