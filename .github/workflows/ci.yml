name: Validar aplicación

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  web-build:
    name: Probar y compilar React y TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas de dominio
        run: npm test

      - name: Compilar aplicación
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          cat build.log
          exit $status

      - name: Conservar diagnóstico de compilación
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 3
