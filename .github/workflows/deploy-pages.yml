name: Publicar RC33 web

on:
  push:
    branches:
      - agent/rc31-web-preview
  pull_request:
    branches:
      - agent/rc24-storage-safety
      - agent/rc31-web-preview
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validar y preparar RC33 web
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

      - name: Compilar aplicación web
        run: npm run build

      - name: Configurar GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Subir sitio web
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Publicar RC33
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Registrar despliegue verificado
        env:
          GH_TOKEN: ${{ github.token }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          gh issue comment 53 --repo "${{ github.repository }}" --body "🚀 **RC33 publicada correctamente en GitHub Pages**\n\nDespliegue verificado por GitHub Actions: ${PAGE_URL}\n\nCommit web publicado: \`${GITHUB_SHA}\`."
