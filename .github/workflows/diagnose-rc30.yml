name: Diagnosticar RC30

on:
  pull_request:
    branches: [main]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependencias
        run: npm install --silent

      - name: Ejecutar pruebas y conservar salida
        id: tests
        shell: bash
        run: |
          set +e
          npm test -- --reporter=verbose > tests-rc30.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Subir diagnóstico
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-pruebas-rc30
          path: tests-rc30.log
          retention-days: 2

      - name: Marcar resultado
        if: steps.tests.outputs.status != '0'
        run: |
          tail -n 60 tests-rc30.log
          exit 1
