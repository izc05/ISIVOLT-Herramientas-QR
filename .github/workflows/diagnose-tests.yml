name: Diagnosticar pruebas RC24

on:
  pull_request:
    branches: [main]

jobs:
  vitest-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar y mostrar solo el resultado de Vitest
        shell: bash
        run: |
          set -o pipefail
          git clone -q --depth 1 --branch "${{ github.head_ref }}" \
            https://github.com/${{ github.repository }}.git app
          cd app
          npm install --silent >/tmp/npm-install.log 2>&1 || {
            tail -n 40 /tmp/npm-install.log
            exit 1
          }
          set +e
          npm test -- --reporter=verbose > /tmp/vitest.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            grep -E -A 8 -B 4 "FAIL|AssertionError|expected|Error:|Test Files|Tests" /tmp/vitest.log | tail -n 70 || true
          else
            tail -n 12 /tmp/vitest.log
          fi
          exit "$status"
