name: Finalizar rama de seguridad

on:
  push:
    branches:
      - feature/security-0.9

permissions:
  contents: write

concurrency:
  group: finalize-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finalize:
    if: ${{ !contains(github.event.head_commit.message, 'chore: finalizar integración de seguridad 0.9') }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          ref: feature/security-0.9
          fetch-depth: 0

      - name: Aplicar integración final
        run: python3 scripts/finalize_security_branch.py

      - name: Confirmar cambios
        run: |
          if git diff --quiet; then
            echo "La rama ya estaba finalizada."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html package.json src/config/app.ts src/AppV2.tsx src/AppV4.tsx src/services/reports.ts src/features/management/managementService.ts src/features/management/managementExport.ts
          git commit -m "chore: finalizar integración de seguridad 0.9"
          git push origin HEAD:feature/security-0.9
