name: Publicar RC33 web en GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
  workflow_run:
    workflows:
      - Publicar RC30 web
    branches:
      - agent/rc31-web-preview
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-rc33
  cancel-in-progress: true

jobs:
  build:
    name: Validar y preparar RC33 web
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama web RC33
        uses: actions/checkout@v4
        with:
          ref: agent/rc31-web-preview

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

      - name: Compilar aplicación web
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir aplicación compilada
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Publicar RC33
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
