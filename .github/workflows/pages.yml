name: Publicar ISIVOLT web en GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
  workflow_run:
    workflows:
      - Validar bloques web
    branches:
      - agent/rc31-web-preview
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages-isivolt-web
  cancel-in-progress: true

jobs:
  build:
    name: Validar y preparar ISIVOLT web
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama web
        uses: actions/checkout@v4
        with:
          ref: agent/rc31-web-preview

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

      - name: Compilar aplicación web
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir aplicación compilada
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Publicar ISIVOLT
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Registrar despliegue verificado
        env:
          GH_TOKEN: ${{ github.token }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          WEB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          gh issue comment 53 --repo "${{ github.repository }}" --body "🚀 **ISIVOLT publicada correctamente en GitHub Pages**

          Despliegue verificado por GitHub Actions: ${PAGE_URL}

          Commit web publicado: \`${WEB_SHA}\`."
