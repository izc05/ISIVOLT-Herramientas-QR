name: Preparar candidata de producción (histórico · manual)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prepare-production-manual
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          ref: feature/production-1.0
          fetch-depth: 0

      - name: Preparar versión e integración
        run: python3 scripts/prepare_production_rc.py

      - name: Confirmar cambios
        run: |
          if git diff --quiet; then
            echo "La candidata ya estaba preparada."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src/config/app.ts index.html README.md
          git commit -m "chore: aplicar candidata de producción 1.0.0-rc.1"
          git push origin HEAD:feature/production-1.0
