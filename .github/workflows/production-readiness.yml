name: Validar candidata de producción

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/production-1.0

permissions:
  contents: read

concurrency:
  group: production-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  candidate:
    name: Probar y generar APK candidata
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Preparar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

      - name: Validar migraciones SQLite
        run: python3 scripts/validate_sqlite_schema.py

      - name: Validar coherencia de producción
        run: node scripts/validate-production.mjs

      - name: Compilar web
        run: npm run build

      - name: Crear Android temporal
        run: npx cap add android

      - name: Generar iconos y splash
        run: npx --yes @capacitor/assets generate --android --assetPath assets

      - name: Aplicar configuración nativa
        run: npm run android:configure

      - name: Configurar versión Android
        run: node scripts/configure-android-production.mjs

      - name: Sincronizar plugins
        run: npx cap sync android

      - name: Compilar APK candidata debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Comprobar versión incluida
        run: cat android/build-metadata.json

      - name: Subir APK candidata
        uses: actions/upload-artifact@v4
        with:
          name: ISIVOLT-Herramientas-QR-v1.0.0-rc.1-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Subir metadatos
        uses: actions/upload-artifact@v4
        with:
          name: ISIVOLT-v1.0.0-rc.1-metadata
          path: android/build-metadata.json
          if-no-files-found: error
          retention-days: 30
