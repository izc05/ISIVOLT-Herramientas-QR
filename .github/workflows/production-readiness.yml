name: Validar candidata de producción

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/production-1.0
      - fix/blank-startup-1.0.0-rc.2
      - fix/android-assets-1.0.0-rc.3
      - fix/mobile-ui-technician-selector-1.0.0-rc.4
      - feature/inventory-operations-1.0.0-rc.5
      - feature/rc6-manual-tools-print-safearea

permissions:
  contents: read

concurrency:
  group: production-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  candidate:
    name: Probar y generar APK candidata
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Preparar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Instalar dependencias
        run: npm install

      - name: Obtener versión de la candidata
        id: candidate-version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          test -n "$VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Candidata detectada: $VERSION"

      - name: Ejecutar pruebas
        run: npm test

      - name: Validar migraciones SQLite
        run: python3 scripts/validate_sqlite_schema.py

      - name: Validar coherencia de producción
        run: node scripts/validate-production.mjs

      - name: Compilar web
        run: npm run build

      - name: Verificar rutas compatibles con Android
        run: node scripts/validate-built-assets.mjs

      - name: Crear Android temporal
        run: npx cap add android

      - name: Conservar recursos Android generados por Capacitor
        run: echo "Se usan los recursos launcher y splash del proyecto Android temporal."

      - name: Aplicar configuración nativa
        run: npm run android:configure

      - name: Configurar versión Android
        run: node scripts/configure-android-production.mjs

      - name: Sincronizar plugins
        run: npx cap sync android

      - name: Verificar plugin de impresión Android
        run: test -d node_modules/@capgo/capacitor-printer

      - name: Verificar assets copiados a Android
        run: |
          test -f android/app/src/main/assets/public/index.html
          grep -q './assets/' android/app/src/main/assets/public/index.html
          ! grep -q '/ISIVOLT-Herramientas-QR/' android/app/src/main/assets/public/index.html

      - name: Compilar APK candidata debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Comprobar versión incluida
        run: cat android/build-metadata.json

      - name: Subir APK candidata
        uses: actions/upload-artifact@v4
        with:
          name: ISIVOLT-Herramientas-QR-v${{ steps.candidate-version.outputs.value }}-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Subir metadatos
        uses: actions/upload-artifact@v4
        with:
          name: ISIVOLT-v${{ steps.candidate-version.outputs.value }}-metadata
          path: android/build-metadata.json
          if-no-files-found: error
          retention-days: 30
