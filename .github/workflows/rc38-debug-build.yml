name: Diagnóstico RC38

on:
  pull_request:
    branches:
      - agent/rc38-station-presence-ux

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Instalar dependencias
        run: npm install
      - name: Compilar RC38
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Guardar diagnóstico completo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc38-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 1
      - name: Marcar fallo de compilación
        if: steps.build.outputs.status != '0'
        run: exit 1
