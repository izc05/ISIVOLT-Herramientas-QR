name: Diagnóstico RC38

on:
  pull_request:
    branches:
      - agent/rc38-station-presence-ux

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci --silent
      - name: Compilar RC38 y guardar diagnóstico
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publicar error en el PR principal temporalmente
        if: steps.build.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Diagnóstico temporal RC38'
            echo
            echo '```text'
            tail -n 80 build.log
            echo '```'
          } > build-comment.md
          gh pr comment 70 --body-file build-comment.md
      - name: Marcar fallo de compilación
        if: steps.build.outputs.status != '0'
        run: exit 1
