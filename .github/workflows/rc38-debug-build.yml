name: Diagnóstico RC38

on:
  pull_request:
    branches:
      - agent/rc38-station-presence-ux

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Compilar y publicar diagnóstico
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -o pipefail
          git clone --quiet --depth 1 --branch "$HEAD_BRANCH" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          npm ci --silent
          set +e
          npm run build > build.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 80 build.log
            {
              echo '### Diagnóstico temporal RC38'
              echo
              echo '```text'
              tail -n 80 build.log
              echo '```'
            } > build-comment.md
            gh pr comment 70 --body-file build-comment.md
            exit "$status"
          fi
          echo 'RC38 compila correctamente.'
