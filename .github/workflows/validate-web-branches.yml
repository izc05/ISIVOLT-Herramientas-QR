name: Validar bloques web

on:
  pull_request:
    branches:
      - main
      - agent/rc24-storage-safety
      - agent/rc31-web-preview
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-web-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Pruebas y compilación web
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

      - name: Compilar TypeScript y Vite
        id: web_build
        continue-on-error: true
        run: npm run build > build-web.log 2>&1

      - name: Guardar diagnóstico de compilación
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-build-web-${{ github.run_id }}
          path: build-web.log
          retention-days: 7

      - name: Mostrar error de compilación
        if: steps.web_build.outcome == 'failure'
        run: |
          cat build-web.log
          exit 1
